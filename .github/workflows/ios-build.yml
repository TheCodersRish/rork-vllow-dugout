# Build the Swift iOS app on every push/PR so failures show up in GitHub → Actions with full logs.
name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Xcode build (Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build VllowDugout
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project VllowDugout.xcodeproj \
            -scheme VllowDugout \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            build 2>&1 | tee xcodebuild.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
